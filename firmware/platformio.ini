[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  adafruit/RTClib @ ^2.1.4
  bblanchon/ArduinoJson @ ^6.21.5

board_build.filesystem = littlefs

build_flags =
  -D USER_SETUP_LOADED
  -D ILI9341_DRIVER
  -D TFT_MISO=19
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
  -D LOAD_FONT6
  -D LOAD_FONT7
  -D LOAD_FONT8
  -D LOAD_GFXFF
  -D SMOOTH_FONT
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=16000000

